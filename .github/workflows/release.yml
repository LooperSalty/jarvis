name: Release

# Publie une release GitHub a chaque tag vX.Y.Z.
# - build-windows : Jarvis.exe + JarvisWeb.exe via PyInstaller (BLOQUANT :
#   le .exe Windows est le livrable principal, son echec doit se voir)
# - build-macos   : binaire mode web macOS via PyInstaller (best-effort)
# - release       : publie uniquement sur tag, et echoue si le binaire
#   Windows manque (pas de release silencieusement amputee)
# Le declenchement manuel (workflow_dispatch) sert de build de test des
# artefacts : les 3 builds tournent mais rien n'est publie hors tag.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-frontend:
    name: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build du bundle frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Archive du bundle
        run: |
          cd frontend && zip -r ../jarvis-frontend-dist.zip dist
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: jarvis-frontend-dist.zip
          if-no-files-found: error

  build-windows:
    name: build-windows
    runs-on: windows-latest
    # Secrets de signature / scan exposes en env pour pouvoir guarder les etapes
    # SignPath et VirusTotal avec `if: env.X != ''` : tant que le secret n'est pas
    # defini sur le repo, l'etape correspondante est sautee et le job se comporte
    # exactement comme avant (binaires non signes).
    env:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
      VT_API_KEY: ${{ secrets.VT_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Garde version (tag == jarvis_version.VERSION)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          python - <<'PY'
          import os, sys
          from jarvis_version import VERSION
          tag = os.environ.get("GITHUB_REF_NAME", "").lstrip("vV")
          if tag != VERSION:
              sys.exit(
                  f"Tag v{tag} != VERSION {VERSION} : bumper jarvis_version.py "
                  "ET version_info.txt avant de taguer (sinon check_update() "
                  "signalera une fausse mise a jour en boucle)."
              )
          print(f"OK : tag v{tag} == VERSION {VERSION}")
          PY
      - name: Build frontend (embarque dans le .exe)
        working-directory: frontend
        run: |
          npm ci
          npx vite build
      - name: Installer les dependances Python
        # requirements-windows.txt = deps runtime reelles (PAS requirements.txt,
        # freeze complet de la machine dev, non installable sur un env vierge).
        # Decision actee : la voix locale (requirements-voice.txt) est EXCLUE du
        # binaire officiel (+100-300 Mo) — STT/wake-word retombent sur le cloud.
        # Les .spec impriment un ATTENTION dans le log de build pour le rappeler.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-windows.txt
      - name: Build Jarvis.exe + JarvisWeb.exe
        # Builds ONEDIR (cf. Jarvis.spec / JarvisWeb.spec) : sortie dans
        # dist\Jarvis\ et dist\JarvisWeb\ (exe + dossier de contenu _internal*).
        # PyInstaller est pinne dans requirements-windows.txt (pas de pip install
        # separe) pour des builds reproductibles et un taux de FP stable.
        run: |
          python -m PyInstaller Jarvis.spec --clean --noconfirm
          python -m PyInstaller JarvisWeb.spec --clean --noconfirm
      # --- Signature de code (SignPath Foundation) — INACTIF tant que le secret
      # SIGNPATH_API_TOKEN n'est pas defini. Une fois le projet approuve par
      # SignPath Foundation (https://signpath.io/solutions/open-source-community) :
      #   1. Creer sur signpath.io le projet + une signing policy + une artifact
      #      configuration ciblant Jarvis/Jarvis.exe et JarvisWeb/JarvisWeb.exe
      #      dans le zip soumis ci-dessous.
      #   2. Ajouter le secret repo SIGNPATH_API_TOKEN et la variable repo
      #      SIGNPATH_ORGANIZATION_ID, puis ajuster les slugs (project / policy /
      #      artifact-configuration) ci-dessous a ce qui a ete cree.
      # La signature a lieu AVANT la compilation de l'installateur pour que les
      # exes installes soient signes. Pour signer aussi JarvisSetup-*.exe,
      # dupliquer ce bloc apres l'etape ISCC.
      - name: Empaqueter les binaires a signer (SignPath)
        if: ${{ env.SIGNPATH_API_TOKEN != '' }}
        shell: pwsh
        run: Compress-Archive -Path dist/Jarvis, dist/JarvisWeb -DestinationPath signpath-unsigned.zip -Force
      - name: Upload de l'artefact non signe (SignPath)
        if: ${{ env.SIGNPATH_API_TOKEN != '' }}
        id: signpath-upload
        uses: actions/upload-artifact@v4
        with:
          name: signpath-unsigned
          path: signpath-unsigned.zip
          if-no-files-found: error
      - name: Soumettre a SignPath et recuperer les binaires signes
        if: ${{ env.SIGNPATH_API_TOKEN != '' }}
        uses: SignPath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ env.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: jarvis
          signing-policy-slug: release-signing
          artifact-configuration-slug: windows-onedir
          github-artifact-id: ${{ steps.signpath-upload.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signpath-signed
      - name: Reinjecter les binaires signes dans dist
        if: ${{ env.SIGNPATH_API_TOKEN != '' }}
        shell: pwsh
        # Le zip signe revient avec la meme arborescence (Jarvis\Jarvis.exe,
        # JarvisWeb\JarvisWeb.exe) : on l'extrait par-dessus dist\. Verifier le
        # nom/chemin retourne par SignPath au 1er run reel et ajuster si besoin.
        run: Expand-Archive -Path signpath-signed/signpath-unsigned.zip -DestinationPath dist -Force
      - name: Scan VirusTotal (diagnostic faux positifs, non bloquant)
        # INACTIF tant que le secret VT_API_KEY n'est pas defini. Mesure combien de
        # moteurs flaguent Jarvis.exe pour suivre l'evolution des FP entre versions.
        if: ${{ env.VT_API_KEY != '' }}
        continue-on-error: true
        shell: pwsh
        run: |
          $r = curl.exe -s --request POST --url https://www.virustotal.com/api/v3/files `
            --header "x-apikey: $env:VT_API_KEY" --form "file=@dist/Jarvis/Jarvis.exe"
          Write-Host $r
          Write-Host "Analyse VirusTotal soumise — consulter le rapport via le hash du fichier sur virustotal.com"
      - name: Build ModelAdvisor.exe
        # Stdlib uniquement (tkinter/ctypes) : aucun requirement supplementaire.
        working-directory: model_advisor
        run: python -m PyInstaller --onefile --windowed --name ModelAdvisor --clean --noconfirm model_advisor.py
      - name: Compiler l'installateur (Inno Setup)
        # JarvisSetup-x.y.z.exe : assistant graphique FR/EN qui installe Jarvis
        # sans prerequis (et, en option, Ollama + un modele local). Le .iss lit
        # les binaires a la racine (BinDir par defaut "..") : on les y copie.
        shell: pwsh
        run: |
          $version = python -c "from jarvis_version import VERSION; print(VERSION)"
          # Builds ONEDIR : deverser le CONTENU de dist\Jarvis et dist\JarvisWeb a
          # la racine (BinDir="..") -> Jarvis.exe + _internal\ et JarvisWeb.exe +
          # _internal_web\ cote a cote, comme l'attend JarvisSetup.iss [Files].
          Copy-Item dist\Jarvis\* -Destination . -Recurse -Force
          Copy-Item dist\JarvisWeb\* -Destination . -Recurse -Force
          Copy-Item model_advisor\dist\ModelAdvisor.exe -Destination . -Force
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup -y --no-progress
          }
          & $iscc /DAppVersion=$version installer\JarvisSetup.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC a echoue ($LASTEXITCODE)" }
      - name: Archive des binaires Windows
        # Builds ONEDIR : on archive les DOSSIERS dist/Jarvis et dist/JarvisWeb
        # (exe + _internal*), plus ModelAdvisor.exe (onefile).
        run: |
          Compress-Archive -Path dist/Jarvis, dist/JarvisWeb, model_advisor/dist/ModelAdvisor.exe -DestinationPath jarvis-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: jarvis-windows.zip
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: installer/output/JarvisSetup-*.exe
          if-no-files-found: error

  build-macos:
    name: build-macos
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend (embarque)
        working-directory: frontend
        run: |
          npm ci
          npx vite build
      - name: Dependances systeme (portaudio pour PyAudio)
        run: brew install portaudio || true
      - name: Installer les dependances Python (mode web macOS)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-macos.txt
          pip install pyinstaller
      - name: Build du binaire web macOS
        run: |
          python -m PyInstaller --onefile --name Jarvis-macos \
            --add-data "frontend/dist:frontend/dist" \
            --add-data "mobile:mobile" \
            --collect-submodules jarvis_actions \
            jarvis_web.py
      - name: Archive du binaire macOS
        run: |
          cd dist && zip -r ../jarvis-macos.zip Jarvis-macos
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: jarvis-macos.zip
          if-no-files-found: warn

  release:
    name: release
    runs-on: ubuntu-latest
    needs: [build-frontend, build-windows, build-macos]
    # Publie uniquement sur tag (un dispatch manuel ne fait que builder les
    # artefacts : softprops/action-gh-release echoue hors tag de toute facon),
    # meme si build-macos (best-effort) a echoue.
    if: always() && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Recuperer les artefacts disponibles
        uses: actions/download-artifact@v4
        with:
          path: artefacts
          merge-multiple: true
      - name: Lister les artefacts
        run: ls -R artefacts || echo "aucun artefact"
      - name: Verifier la presence des livrables Windows
        # Le .exe Windows et l'installateur sont les livrables principaux :
        # pas de release sans eux.
        run: |
          test -f artefacts/jarvis-windows.zip || {
            echo "::error::jarvis-windows.zip absent — release annulee (voir job build-windows)"
            exit 1
          }
          ls artefacts/JarvisSetup-*.exe >/dev/null 2>&1 || {
            echo "::error::JarvisSetup-*.exe absent — release annulee (voir l'etape Inno Setup du job build-windows)"
            exit 1
          }
      - name: Publier la release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            artefacts/JarvisSetup-*.exe
            artefacts/jarvis-frontend-dist.zip
            artefacts/jarvis-windows.zip
            artefacts/jarvis-macos.zip
