<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>J.A.R.V.I.S</title>
  </head>
  <body>
    <div id="connection-badge" class="disconnected">
      <span class="dot"></span>
      <span id="connection-label">deconnecte</span>
    </div>

    <a id="dashboard-link" href="/dashboard.html" title="Configuration de Jarvis"
       style="position:fixed;top:16px;right:132px;z-index:11;width:36px;height:36px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#7fd4ff;background:rgba(10,16,28,.85);border:1px solid rgba(75,225,255,.18);text-decoration:none;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </a>

    <button id="chat-toggle" type="button" title="Historique">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </button>

    <aside id="chat-panel" class="hidden">
      <header>
        <span id="chat-title">Conversation</span>
        <div class="chat-actions">
          <button id="chat-archive" type="button" title="Anciennes conversations" aria-label="Archive">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
          </button>
          <button id="chat-close" type="button" aria-label="Fermer">&times;</button>
        </div>
      </header>
      <div id="chat-messages"></div>
      <div id="chat-archive-list" class="hidden"></div>
    </aside>

    <canvas id="orb-canvas"></canvas>

    <div id="status-text"></div>
    <div id="error-text"></div>

    <div id="bottom-bar">
      <form id="text-form" autocomplete="off">
        <input
          id="text-input"
          type="text"
          placeholder="Tape ta question, ou maintiens espace pour parler..."
          autocomplete="off"
          spellcheck="false"
        />
        <button id="text-send" type="submit" aria-label="Envoyer">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </form>
      <button id="ptt-button" type="button" aria-pressed="false" title="Maintenir pour parler (ou Espace)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
      </button>
      <button id="mute-button" type="button" aria-pressed="false" disabled>
        mute
      </button>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
